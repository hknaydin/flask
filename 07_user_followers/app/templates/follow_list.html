{% extends "base.html" %}
{% block content %}

<h2>{{ title }}</h2>

{% if users %}
    <ul>
    {% for u in users %}
        <li>
            <a href="{{ url_for('user', username=u.username) }}">
                {{ u.username }}
            </a>
        </li>
    {% endfor %}
    </ul>
{% else %}
    <p>Henüz kullanıcı yok</p>
{% endif %}

{% endblock %}
